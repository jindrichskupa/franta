# goreleaser config: https://goreleaser.com
# Run locally:  goreleaser release --snapshot --clean --skip publish
version: 2

project_name: franta

before:
  hooks:
    - go mod tidy

builds:
  - id: franta
    main: ./cmd/franta
    binary: franta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: archives
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE*
      - config.example.yaml
      - completions/*
      - man/franta.1

# Debian / Ubuntu .deb packages built via nfpm (same .deb installs on both;
# Ubuntu is Debian-derived and the dependency set used here is universal).
nfpms:
  - id: deb
    package_name: franta
    file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Arch }}
    vendor: "Jindrich Skupa"
    homepage: "https://github.com/jindrichskupa/franta"
    maintainer: "Jindrich Skupa <jindrich.skupa@gmail.com>"
    description: |
      Terminal UI for Apache Kafka with AWS MSK IAM auth, SQL-ish filter DSL,
      consumer-group lag, and Schema Registry decoding (Confluent + AWS Glue).
    license: MIT
    formats:
      - deb
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: config.example.yaml
        dst: /usr/share/franta/config.example.yaml
        type: config|noreplace
      - src: README.md
        dst: /usr/share/doc/franta/README.md
      - src: completions/franta.bash
        dst: /usr/share/bash-completion/completions/franta
      - src: completions/franta.zsh
        dst: /usr/share/zsh/site-functions/_franta
      - src: completions/franta.fish
        dst: /usr/share/fish/vendor_completions.d/franta.fish
      - src: man/franta.1
        dst: /usr/share/man/man1/franta.1
    # Same artifact works for Debian and Ubuntu — both consume .deb. The
    # release notes will recommend `apt install ./franta_*_amd64.deb`.
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

# Homebrew tap (cask). goreleaser pushes a generated cask to the tap repo on
# each release. Users then:  brew install --cask jindrichskupa/tap/franta
# Prerequisites (one-time, manual):
#   1. Create an empty public repo: github.com/jindrichskupa/homebrew-tap
#   2. Create a GitHub PAT that can push to it (fine-grained: contents:write on
#      homebrew-tap; or classic with `repo` scope).
#   3. Add it as an Actions secret named HOMEBREW_TAP_GITHUB_TOKEN on this repo.
# The default GITHUB_TOKEN cannot push to a different repo, hence the PAT.
homebrew_casks:
  - name: franta
    repository:
      owner: jindrichskupa
      name: homebrew-tap
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/jindrichskupa/franta"
    description: "Terminal UI for Apache Kafka with MSK IAM auth, filter DSL, consumer-group lag, and Schema Registry decoding"
    license: "MIT"
    # Shell completions + man page bundled in the release archive (see
    # archives.files) and installed by the cask.
    completions:
      bash: completions/franta.bash
      zsh: completions/franta.zsh
      fish: completions/franta.fish
    manpages:
      - man/franta.1
    # The released binary is unsigned; strip the Gatekeeper quarantine xattr on
    # install so macOS doesn't block first launch.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/franta"]
          end

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Performance
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: Refactor
      regexp: "^.*refactor[(\\w)]*:+.*$"
      order: 3
    - title: Other
      order: 99
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
      - "^typo"

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## franta {{ .Tag }}

    Terminal UI for Apache Kafka.

    ### Install

    **Homebrew (macOS / Linux):**
    ```bash
    brew install --cask jindrichskupa/tap/franta
    ```

    **Debian / Ubuntu:**
    ```bash
    curl -sL https://github.com/jindrichskupa/franta/releases/download/{{ .Tag }}/franta_{{ .Version }}_amd64.deb -o franta.deb
    sudo apt install ./franta.deb
    ```

    **macOS / Linux tarball:**
    ```bash
    curl -sL https://github.com/jindrichskupa/franta/releases/download/{{ .Tag }}/franta_{{ .Version }}_$(uname -s)_$(uname -m).tar.gz | tar xz
    ```

    **Go:**
    ```bash
    go install github.com/jindrichskupa/franta/cmd/franta@{{ .Tag }}
    ```
  footer: |
    **Full Changelog**: https://github.com/jindrichskupa/franta/compare/{{ .PreviousTag }}...{{ .Tag }}
