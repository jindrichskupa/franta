name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # required for changelog from git history

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT that can push to jindrichskupa/homebrew-tap (the default
          # GITHUB_TOKEN is scoped to this repo only). Add it under
          # Settings → Secrets → Actions. If the secret is absent the cask
          # step fails; remove homebrew_casks from .goreleaser.yaml to skip it.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
