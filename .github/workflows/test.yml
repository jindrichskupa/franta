name: test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l internal/ cmd/)
          if [ -n "$out" ]; then
            echo "gofmt needs to run on:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: unit tests
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          # Need a release binary built with go1.26+ to lint modules pinned at
          # go 1.26 in go.mod. v2.12.x is built with go1.26; older 2.x line
          # (incl. 2.1.6) is still on go1.24 and fails with "go language
          # version used to build golangci-lint is lower than the targeted
          # Go version".
          version: v2.12.2
          args: --timeout=5m
