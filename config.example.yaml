default_cluster: local
clusters:
  local:
    brokers: ["localhost:9092"]
    auth:
      type: plaintext

  staging:
    brokers: ["b1.example:9094", "b2.example:9094"]
    tls: true
    auth:
      type: scram
      mechanism: SCRAM-SHA-512
      username: svc-franta
      password_env: FRANTA_STAGING_PASSWORD

  prod-msk:
    brokers: ["b-1.msk.example:9098", "b-2.msk.example:9098"]
    tls: true
    auth:
      type: iam
      region: eu-west-1
      profile: prod
    # Optional. Same mini-syntax as --from. Used when --from is not on the CLI.
    # Falls back to "end" if unset on the cluster too.
    default_seek: last:500

# Optional. Read-only inline filter library. Use ctrl+s in the TUI filter editor
# to save more — those land in filters.yaml next to this file (preserves the
# comments here). F recalls.
saved_filters:
  - name: errors
    query: 'header[''severity''] == "ERROR" or value.error contains "FAIL"'
  - name: paid-orders
    query: 'value.status == "PAID" and value.amount >= 100'
